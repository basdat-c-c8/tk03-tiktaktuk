{% extends 'base.html' %}
{% load static %}

{% block content %}

<div style="margin-bottom:24px;">

  <a
      href="{% url 'main:show_main' %}"
      style="
          text-decoration:none;
          color:#2563eb;
          font-weight:600;
          font-size:15px;
      "
  >
      ← Kembali ke Dashboard
  </a>

</div>

<div class="content">

    <div class="page-header">

        <div>
            <h1>Kategori Tiket</h1>
            <p>Kelola kategori dan harga tiket tiap acara</p>
        </div>

    </div>


    <div class="stats-grid">

        <div class="stat-card">
            <span>Total Kategori</span>
            <h2 id="statTotal">0</h2>
        </div>

        <div class="stat-card">
            <span>Total Kuota</span>
            <h2 id="statKuota">0</h2>
        </div>

        <div class="stat-card">
            <span>Harga Tertinggi</span>
            <h2 id="statHarga">Rp 0</h2>
        </div>

    </div>



    <div class="table-card">

        <div class="table-top">

            <input
                type="text"
                id="searchInput"
                placeholder="Cari kategori tiket..."
                onkeyup="render()"
            >

            <select
                id="eventFilter"
                onchange="render()"
            >

                <option value="">
                    Semua Acara
                </option>

                {% for e in events %}
                <option value="{{ e.event_title }}">
                    {{ e.event_title }}
                </option>
                {% endfor %}

            </select>

        </div>


        <table>

            <thead>

                <tr>
                    <th>Kategori</th>
                    <th>Acara</th>
                    <th>Harga</th>
                    <th>Kuota</th>
                </tr>

            </thead>

            <tbody id="tableBody"></tbody>

        </table>


        <div
            id="emptyMsg"
            class="empty-msg"
            style="display:none;"
        >
            Belum ada kategori tiket.
        </div>

    </div>

</div>



<style>
*{
    font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        'Segoe UI',
        sans-serif;
}

.content{
    padding:40px;
}

.content{
    padding:40px;
}

.page-header h1{
    font-size:42px;
    margin-bottom:8px;
    color:#0f172a;
}

.page-header p{
    color:#64748b;
    margin-bottom:28px;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:28px;
}

.stat-card{
    background:white;
    padding:28px;
    border-radius:20px;
}

.stat-card span{
    color:#94a3b8;
    font-size:14px;
}

.stat-card h2{
    margin-top:12px;
    font-size:36px;
    color:#0f172a;
}

.table-card{
    background:white;
    border-radius:24px;
    overflow:hidden;
}

.table-top{
    display:flex;
    gap:16px;
    padding:24px;
    border-bottom:1px solid #e2e8f0;
}

.table-top input{
    flex:1;
    height:48px;
    border:1px solid #cbd5e1;
    border-radius:14px;
    padding:0 16px;
}

.table-top select{
    width:220px;
    border:1px solid #cbd5e1;
    border-radius:14px;
    padding:0 14px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:18px 24px;
    color:#94a3b8;
    font-size:13px;
}

td{
    padding:22px 24px;
    border-top:1px solid #f1f5f9;
}

.empty-msg{
    padding:60px;
    text-align:center;
    color:#94a3b8;
    font-weight:600;
}

</style>



<script>

const DATA = [
{% for c in categories %}
{
    id: "{{ c.category_id }}",
    name: "{{ c.category_name|escapejs }}",
    event: "{{ c.event.event_title|escapejs }}",
    price: Number("{{ c.price }}"),
    quota: {{ c.quota }},
},
{% endfor %}
];


function rp(n){
    return 'Rp ' + Number(n).toLocaleString('id-ID');
}


function getFiltered(){

    const q =
        document
            .getElementById('searchInput')
            .value
            .trim()
            .toLowerCase();

    const ev =
        document
            .getElementById('eventFilter')
            .value;

    return DATA.filter(c =>

        (
            !q ||

            c.name.toLowerCase().includes(q) ||

            c.event.toLowerCase().includes(q)
        )

        &&

        (
            !ev ||

            c.event === ev
        )
    );
}



function render(){

    const data = getFiltered();

    document.getElementById('statTotal')
        .textContent = DATA.length;

    document.getElementById('statKuota')
        .textContent =
            DATA
                .reduce((a,b)=>a+b.quota,0)
                .toLocaleString('id-ID');

    document.getElementById('statHarga')
        .textContent =

            DATA.length

            ? rp(
                Math.max(...DATA.map(c=>c.price))
            )

            : 'Rp 0';


    const tbody =
        document.getElementById('tableBody');

    const empty =
        document.getElementById('emptyMsg');


    if(data.length === 0){

        tbody.innerHTML = '';

        empty.style.display = 'block';

        return;
    }

    empty.style.display = 'none';


    tbody.innerHTML = data.map(c => `

        <tr>

            <td>
                <strong>${c.name}</strong>
            </td>

            <td>
                ${c.event}
            </td>

            <td style="color:#2563eb;font-weight:700;">
                ${rp(c.price)}
            </td>

            <td>
                ${c.quota.toLocaleString('id-ID')} tiket
            </td>

        </tr>

    `).join('');

}


render();

</script>

{% endblock %}
