{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>

.order-page{
    padding:40px;
    max-width:1100px;
    margin:0 auto;
}

.order-header{
    margin-bottom:28px;
}

.order-title{
    font-size:44px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:8px;
}

.order-subtitle{
    color:#64748b;
    font-size:16px;
}

.checkout-grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:24px;
    align-items:start;
}

.card-box{
    background:white;
    border-radius:24px;
    padding:24px;
    box-shadow:0 2px 10px rgba(15,23,42,0.04);
}

.section-title{
    font-size:18px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:18px;
}

.form-group{
    margin-bottom:18px;
}

.form-label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
    color:#334155;
}

.form-input,
.form-select{
    width:100%;
    height:52px;
    border:1px solid #dbe2ea;
    border-radius:14px;
    padding:0 16px;
    font-size:15px;
    outline:none;
    background:white;
}

.form-input:focus,
.form-select:focus{
    border-color:#2563eb;
}

.summary-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:14px;
    color:#475569;
}

.summary-total{
    display:flex;
    justify-content:space-between;
    padding-top:18px;
    margin-top:18px;
    border-top:1px solid #e2e8f0;
    font-size:22px;
    font-weight:700;
    color:#0f172a;
}

.checkout-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:16px;
    background:#2563eb;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:24px;
}

.checkout-btn:hover{
    background:#1d4ed8;
}

@media(max-width:900px){

    .checkout-grid{
        grid-template-columns:1fr;
    }

    .order-page{
        padding:24px;
    }

    .order-title{
        font-size:34px;
    }
}

</style>

<div class="order-page">

    <div class="order-header">
        <div class="order-title">
            Checkout Tiket
        </div>

        <div class="order-subtitle">
            Lengkapi pemesanan tiket event Anda
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="checkout-grid">

            <!-- LEFT -->

            <div>

                <div class="card-box">

                    <div class="section-title">
                        Detail Pemesanan
                    </div>

                    <div class="form-group">

                        <label class="form-label">
                            Pilih Event
                        </label>

                        <select name="event" id="eventSelect" class="form-select" required>

                            <option value="">
                                Pilih Event
                            </option>

                            {% for e in events %}
                            <option value="{{ e.event_id }}">
                                {{ e.event_title }}
                            </option>
                            {% endfor %}

                        </select>

                    </div>

                    <div class="form-group">

                        <label class="form-label">
                            Kategori Tiket
                        </label>

                        <select name="category" class="form-select" required>

                            <option value="">
                                Pilih Kategori
                            </option>

                            {% for c in categories %}
                            <option value="{{ c.category_id }}">
                                {{ c.category_name }} —
                                {{ c.event.event_title }} —
                                Rp {{ c.price }}
                            </option>
                            {% endfor %}

                        </select>

                    </div>

                    <div class="form-group">

                        <label class="form-label">
                            Jumlah Tiket
                        </label>

                        <input
                            type="number"
                            name="quantity"
                            class="form-input"
                            min="1"
                            max="10"
                            value="1"
                            required
                        >

                    </div>

                    <div class="form-group">

                        <label class="form-label">
                            Kode Promo
                        </label>

                        <input
                            type="text"
                            name="promo_code"
                            class="form-input"
                            placeholder="Masukkan kode promo"
                        >

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div>

                <div class="card-box">

                    <div class="section-title">
                        Ringkasan
                    </div>

                    <div class="summary-item">
                        <span>Status</span>
                        <span>Pending</span>
                    </div>

                    <div class="summary-item">
                        <span>Maksimal Tiket</span>
                        <span>10 tiket</span>
                    </div>

                    <div class="summary-total">
                        <span>Total</span>
                        <span>Auto Calculate</span>
                    </div>

                    <button type="submit" class="checkout-btn">
                        Buat Order
                    </button>

                </div>

            </div>

        </div>

    </form>

</div>

{% endblock %}
